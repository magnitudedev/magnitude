<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56" fill="white">
  <!-- Background (slate-800 = #1e293b) -->
  <rect x="0" y="0" width="56" height="56" rx="8" ry="8" fill="#1e293b"/>

  <!-- M logo - 8x8 pixel grid, 5px per cell, 8px padding all sides -->
  <g transform="translate(8, 8)">
    <polygon points="
      0,0 10,0 10,5 15,5 15,10 25,10 25,25 15,25 15,20 10,20 10,40 0,40
    "/>
    <polygon points="
      40,0 30,0 30,5 25,5 25,10 15,10 15,25 25,25 25,20 30,20 30,40 40,40
    "/>
  </g>
</svg>
